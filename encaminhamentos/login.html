<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Encaminhamentos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="../apoia/logo.png" alt="Logo Escola" class="login-logo">
            <h1>Acesso Encaminhamentos</h1>
            <p class="muted-text text-center">Sistema da Orientação</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" autocomplete="current-password" required>
                </div>
                <button type="submit" id="login-btn">Entrar</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
